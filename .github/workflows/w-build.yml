name: Release to NuGet

on:
  release:
    types: [published]

env:
  DOTNET_VERSION: '10.0'
  PACKAGE_VERSION: ${{ github.ref_name }}

jobs:
  publish:
    name: Pack and Publish
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install UI dependencies
      working-directory: src/ui
      run: npm ci

    # Pack Core first (UI and Worker depend on it)
    - name: Pack Jobly.Core
      working-directory: src/core/Jobly.Core
      run: dotnet pack -c Release -p:PackageVersion=${{ env.PACKAGE_VERSION }} -o ../../../nupkgs

    # Push Core to nuget.org so UI and Worker can resolve it
    - name: Push Jobly.Core
      run: dotnet nuget push "nupkgs/Jobly.Core.${{ env.PACKAGE_VERSION }}.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}

    # Pack UI and Worker (reference Jobly.Core via PackageVersion)
    - name: Pack Jobly.UI
      working-directory: src/core/Jobly.UI
      run: dotnet pack -c Release -p:PackageVersion=${{ env.PACKAGE_VERSION }} -o ../../../nupkgs

    - name: Pack Jobly.Worker
      working-directory: src/core/Jobly.Worker
      run: dotnet pack -c Release -p:PackageVersion=${{ env.PACKAGE_VERSION }} -o ../../../nupkgs

    - name: Push Jobly.UI
      run: dotnet nuget push "nupkgs/Jobly.UI.${{ env.PACKAGE_VERSION }}.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}

    - name: Push Jobly.Worker
      run: dotnet nuget push "nupkgs/Jobly.Worker.${{ env.PACKAGE_VERSION }}.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }}

name: Test

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0'
  # Opt into Node.js 24 for JS-based actions (setup-dotnet, setup-node, checkout).
  # Node 20 is deprecated on GitHub Actions runners from 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: ${{ matrix.database }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - database: PostgreSQL
            filter: --filter-trait "Category=PostgreSql"
          - database: SQL Server
            filter: --filter-trait "Category=SqlServer"
          - database: NoDb
            filter: --filter-trait "Category=NoDb"

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Setup Node.js (for Jobly.UI npm build)
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/ui/package-lock.json

      - name: Install UI dependencies
        working-directory: src/ui
        run: npm ci

      - name: Restore
        working-directory: src
        run: dotnet restore tests/Jobly.Tests/Jobly.Tests.csproj

      - name: Build
        working-directory: src
        run: dotnet build tests/Jobly.Tests/Jobly.Tests.csproj --no-restore --configuration Debug

      - name: Test (${{ matrix.database }})
        working-directory: src
        run: |
          dotnet test --project tests/Jobly.Tests/Jobly.Tests.csproj --no-build --configuration Debug -- \
            ${{ matrix.filter }} \
            --report-trx --report-trx-filename test-results.trx \
            --results-directory "$GITHUB_WORKSPACE/test-results"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.database }}
          path: test-results/*.trx
          retention-days: 7

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2.23.0
        with:
          check_name: ${{ matrix.database }} tests
          files: test-results/**/*.trx
          comment_mode: off

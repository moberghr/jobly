name: Release to NuGet

on:
  release:
    types: [published]

env:
  DOTNET_VERSION: '10.0'
  PACKAGE_VERSION: ${{ github.ref_name }}
  # Opt into Node.js 24 for JS-based actions (checkout, setup-dotnet, setup-node, NuGet/login).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  publish:
    name: Pack and Publish
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write  # Required for NuGet trusted publishing OIDC

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install UI dependencies
      working-directory: src/ui
      run: npm ci

    # Pack Core first — UI and Worker depend on it
    - name: Pack Moberg.Jobly.Core
      working-directory: src/core/Jobly.Core
      run: dotnet pack -c Release -p:PackageVersion=${{ env.PACKAGE_VERSION }} -o ${{ github.workspace }}/nupkgs

    # Add local folder as NuGet source so UI/Worker can resolve Core during pack
    - name: Add local NuGet source
      run: dotnet nuget add source ${{ github.workspace }}/nupkgs --name local

    - name: Pack Moberg.Jobly.UI
      working-directory: src/core/Jobly.UI
      run: dotnet pack -c Release -p:PackageVersion=${{ env.PACKAGE_VERSION }} -o ${{ github.workspace }}/nupkgs

    - name: Pack Moberg.Jobly.Worker
      working-directory: src/core/Jobly.Worker
      run: dotnet pack -c Release -p:PackageVersion=${{ env.PACKAGE_VERSION }} -o ${{ github.workspace }}/nupkgs

    # Get short-lived API key via trusted publishing (OIDC, no stored secrets)
    - name: NuGet login
      uses: NuGet/login@v1
      id: nuget-login
      with:
        user: ${{ secrets.NUGET_USER }}

    # Push all packages to nuget.org
    - name: Push to NuGet
      run: dotnet nuget push "${{ github.workspace }}/nupkgs/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --skip-duplicate
